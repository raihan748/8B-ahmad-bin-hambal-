<!DOCTYPE html>
<html lang="id" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Chat — SMPIT Al-Fityan 8B Ahmad bin Hambal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } }</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            height: 100vh;
            overflow: hidden
        }

        .chat-container {
            height: calc(100vh - 4rem)
        }

        #messagesBox {
            scrollbar-width: thin;
            scrollbar-color: #6366f1 transparent
        }

        #messagesBox::-webkit-scrollbar {
            width: 4px
        }

        #messagesBox::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 9999px
        }

        .toast {
            animation: slideIn .3s ease, fadeOut .5s ease 3.5s forwards
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(100%)
            }
        }

        .msg-anim {
            animation: popIn .25s cubic-bezier(.4, 0, .2, 1)
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.9) translateY(8px)
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0)
            }
        }
    </style>
</head>

<body class="font-sans bg-gray-900 text-gray-100 transition-colors duration-300 flex flex-col">

    <!-- USERNAME MODAL -->
    <div id="usernameModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm">
        <div class="bg-gray-800 rounded-3xl p-8 w-full max-w-sm mx-4 shadow-2xl text-center">
            <div class="text-5xl mb-4">💬</div>
            <h2 class="text-2xl font-black text-white mb-2">Masuk ke Chat</h2>
            <p class="text-gray-400 text-sm mb-6">Masukkan namamu untuk mulai chatting</p>
            <input id="usernameInput" type="text" placeholder="Nama kamu..." maxlength="20"
                class="w-full px-4 py-3 rounded-xl bg-gray-700 border border-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4 text-center text-lg" />
            <button id="enterChat"
                class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-bold rounded-xl hover:opacity-90 transition-all hover:scale-105">
                Mulai Chat <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toastContainer" class="fixed top-4 right-4 z-[200] space-y-2 pointer-events-none"></div>

    <!-- NAVBAR -->
    <nav class="bg-gray-900 border-b border-gray-800 h-16 flex items-center px-4 gap-4 flex-shrink-0 z-10">
        <a href="/"
            class="w-9 h-9 rounded-xl bg-indigo-600 flex items-center justify-center text-white font-bold hover:bg-indigo-500 transition-colors">AF</a>
        <div class="flex items-center gap-2 flex-1">
            <div class="w-3 h-3 rounded-full bg-green-400 animate-pulse"></div>
            <h1 class="text-white font-bold">Live Chat Kelas 8B Ahmad bin Hambal</h1>
            <span id="onlineCount" class="text-gray-400 text-sm"></span>
        </div>
        <a href="/"
            class="hidden md:flex items-center gap-1.5 text-gray-400 hover:text-white text-sm transition-colors">
            <i class="fa-solid fa-home"></i>
        </a>
        <a href="/forum.html"
            class="hidden md:flex items-center gap-1.5 text-gray-400 hover:text-white text-sm transition-colors">
            <i class="fa-solid fa-comments"></i> Forum
        </a>
        <button id="darkToggle"
            class="w-9 h-9 rounded-xl bg-gray-800 text-gray-400 flex items-center justify-center hover:text-white hover:bg-gray-700 transition-all">
            <i class="fa-solid fa-moon"></i>
        </button>
    </nav>

    <!-- MAIN CHAT AREA -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <div class="hidden md:flex w-56 bg-gray-800 border-r border-gray-700 flex-col flex-shrink-0">
            <div class="p-4 border-b border-gray-700">
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Channels</div>
                <div
                    class="flex items-center gap-2 px-3 py-2 rounded-xl bg-indigo-600/30 border border-indigo-500/30 text-indigo-300">
                    <i class="fa-solid fa-hashtag text-xs"></i>
                    <span class="font-semibold text-sm">umum</span>
                </div>
            </div>
            <div class="p-4">
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Quick Links</div>
                <a href="/assignments.html"
                    class="flex items-center gap-2 px-3 py-2 rounded-xl text-gray-400 hover:text-white hover:bg-gray-700 transition-all text-sm">
                    <i class="fa-solid fa-book-open text-xs"></i>Tugas
                </a>
                <a href="/grades.html"
                    class="flex items-center gap-2 px-3 py-2 rounded-xl text-gray-400 hover:text-white hover:bg-gray-700 transition-all text-sm">
                    <i class="fa-solid fa-chart-bar text-xs"></i>Nilai
                </a>
                <a href="/forum.html"
                    class="flex items-center gap-2 px-3 py-2 rounded-xl text-gray-400 hover:text-white hover:bg-gray-700 transition-all text-sm">
                    <i class="fa-solid fa-comments text-xs"></i>Forum
                </a>
            </div>
        </div>

        <!-- Messages -->
        <div class="flex flex-col flex-1 overflow-hidden">
            <div id="messagesBox" class="flex-1 overflow-y-auto p-4 space-y-1">
                <div class="text-center p-8">
                    <div class="text-4xl mb-3">👋</div>
                    <p class="text-gray-400 text-sm">Selamat datang di <strong class="text-white">#umum</strong>!
                        Mulaikanlah percakapan.</p>
                </div>
            </div>

            <!-- Input -->
            <div class="p-4 bg-gray-800 border-t border-gray-700 flex gap-3 items-end">
                <div class="flex-1 bg-gray-700 rounded-2xl px-4 py-3 flex items-end gap-2">
                    <textarea id="messageInput" placeholder="Kirim pesan ke #umum..." rows="1"
                        class="flex-1 bg-transparent text-white placeholder-gray-400 focus:outline-none resize-none text-sm max-h-32 overflow-y-auto"></textarea>
                    <button id="emojiBtn" class="text-gray-400 hover:text-yellow-400 transition-colors flex-shrink-0"
                        title="Emoji">
                        <i class="fa-regular fa-face-smile text-lg"></i>
                    </button>
                </div>
                <button id="sendBtn"
                    class="w-12 h-12 rounded-2xl bg-indigo-600 hover:bg-indigo-500 text-white flex items-center justify-center transition-all hover:scale-105 flex-shrink-0 shadow-lg">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Dark mode init
        const root = document.documentElement;
        if (localStorage.getItem('theme') === 'light') { /* keep dark for chat */ }

        let myUsername = '';
        let myColor = '#6366f1';
        let socket;

        const emojis = ['😀', '😂', '🥰', '😎', '🤔', '😯', '👍', '👏', '🔥', '💪', '🎉', '❤️', '😅', '😭', '🙏', '⭐', '💡', '🚀'];
        let emojiOpen = false;
        document.getElementById('emojiBtn').addEventListener('click', () => {
            const existing = document.getElementById('emojiPicker');
            if (existing) { existing.remove(); emojiOpen = false; return; }
            const picker = document.createElement('div');
            picker.id = 'emojiPicker';
            picker.className = 'absolute bottom-20 left-4 bg-gray-700 border border-gray-600 rounded-2xl p-3 grid grid-cols-6 gap-2 shadow-xl z-50';
            picker.style.position = 'fixed';
            picker.style.bottom = '90px';
            picker.style.left = '260px';
            emojis.forEach(e => {
                const btn = document.createElement('button');
                btn.className = 'text-xl hover:scale-125 transition-transform';
                btn.textContent = e;
                btn.onclick = () => { document.getElementById('messageInput').value += e; picker.remove(); };
                picker.appendChild(btn);
            });
            document.body.appendChild(picker);
            emojiOpen = true;
            document.addEventListener('click', (evt) => {
                if (!picker.contains(evt.target) && evt.target !== document.getElementById('emojiBtn')) picker.remove();
            }, { once: true });
        });

        function showToast(username, message, color) {
            if (document.hasFocus()) return;
            const t = document.createElement('div');
            t.className = 'toast flex items-start gap-3 bg-gray-800 border border-gray-700 rounded-2xl p-3 shadow-xl max-w-sm';
            t.innerHTML = `
      <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style="background:${color}">${username[0].toUpperCase()}</div>
      <div><div class="text-white text-sm font-semibold">${username}</div><div class="text-gray-400 text-xs truncate max-w-[200px]">${message}</div></div>
    `;
            document.getElementById('toastContainer').appendChild(t);
            setTimeout(() => t.remove(), 4500);
        }

        function appendMessage(data) {
            const box = document.getElementById('messagesBox');
            const el = document.createElement('div');

            if (data.type === 'system') {
                el.className = 'msg-anim text-center py-1';
                el.innerHTML = `<span class="text-gray-500 text-xs px-3 py-1 bg-gray-800 rounded-full">${data.text} · ${data.time}</span>`;
            } else {
                const isMe = data.username === myUsername;
                el.className = 'msg-anim flex items-start gap-3 group hover:bg-white/5 px-2 py-1 rounded-xl transition-colors';
                el.innerHTML = `
        <div class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-xs font-bold flex-shrink-0 mt-0.5" style="background:${data.color}">${data.username[0].toUpperCase()}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-baseline gap-2 mb-0.5">
            <span class="text-sm font-semibold" style="color:${data.color}">${data.username}${isMe ? ' (Kamu)' : ''}</span>
            <span class="text-gray-500 text-xs">${data.time}</span>
          </div>
          <p class="text-gray-200 text-sm break-words">${escapeHtml(data.message)}</p>
        </div>
      `;
                if (!isMe) showToast(data.username, data.message, data.color);
            }
            box.appendChild(el);
            box.scrollTop = box.scrollHeight;
        }

        function escapeHtml(t) {
            return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/\n/g, '<br>');
        }

        function initSocket(username) {
            socket = io();
            socket.emit('join', { username });
            socket.on('color_assigned', ({ color }) => { myColor = color; });
            socket.on('online_count', ({ count }) => {
                document.getElementById('onlineCount').textContent = `· ${count} online`;
            });
            socket.on('chat_message', appendMessage);
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const msg = input.value.trim();
            if (!msg) return;
            socket.emit('send_message', { message: msg });
            input.value = '';
            input.style.height = 'auto';
        }

        document.getElementById('enterChat').addEventListener('click', async () => {
            const name = document.getElementById('usernameInput').value.trim();
            if (!name) { document.getElementById('usernameInput').focus(); return; }
            myUsername = name;
            document.getElementById('usernameModal').classList.add('hidden');

            // Load history
            const r = await fetch('/api/chat');
            const history = await r.json();
            history.forEach(m => appendMessage({
                type: 'user', username: m.username, message: m.message, color: m.color,
                time: m.created_at.split(' ')[1]?.substring(0, 5) || '',
            }));
            initSocket(name);
        });

        document.getElementById('usernameInput').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('enterChat').click(); });
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });
        document.getElementById('messageInput').addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 128) + 'px';
        });
    </script>
</body>

</html>
